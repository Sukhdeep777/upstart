<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-User</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
</head>
<body class="bg-gray-600 flex items-center justify-center h-screen">
    <div class="flex-col items-center w-[600px] h-[auto] bg-gray-100 rounded-xl gap-8 flex">
        <div class=" w-[500px] text-center"><p class="text-6xl text-blue-400 mt-8 font-bold">Crea tu usuario</p></div>
        <div class="flex flex-col">
            <label for="" class="font-semibold">Nombre:</label>
            <input class="bg-gray-300 transition duration-500 rounded-lg w-[500px] text-xl mb-5 px-3 py-2 outline-none " type="text" placeholder="Escriba su nombre, ejemplo: Juan">
            <label for="" class="font-semibold">Apellido:</label>
            <input class="bg-gray-300 transition duration-500 rounded-lg w-[500px] text-xl mb-5 px-3 py-2 outline-none " type="text" placeholder="Escriba su apellido, ejemplo: Garcia">
            <label for="" class="font-semibold">Edad:</label>
            <input class="bg-gray-300  transition duration-500 rounded-lg w-[500px] text-xl mb-5 px-3 py-2 outline-none " type="number" max="99" min="1" placeholder="Escriba su edad (1-99)">
            <label for="" class="font-semibold">Contraseña:</label>
            <input type="password" placeholder="Crea una contraseña con 7-8 caracteres" class="bg-gray-300 transition duration-500 rounded-lg w-[500px] mb-5 text-xl px-3 py-2 outline-none">
            <label for="" class="font-semibold">Confirmar Contraseña:</label>
            <input type="password" placeholder="Crea una contraseña con 7-8 caracteres" class="bg-gray-300 transition duration-500 rounded-lg w-[500px] text-xl mb-5 px-3 py-2 outline-none">        
        </div>
        <div class="flex justify-center">
            <button class="hover:bg-blue-400 hover:scale-110 transition duration-500 cursor-pointer justify-center bg-[#00c9c9] w-[200px] h-[50px] rounded-xl text-xl ">Crear cuenta</button>
        </div>
        <div class="mb-10">
            <p>Ya tienes una cuenta? <a href="login.html" class="text-blue-600 underline">Log In</a></p>
        </div>
    </div>
</body>
</html>
