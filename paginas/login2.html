<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-User</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="shortcut icon" href="../imagenes/icono.png" type="image/x-icon">
</head>
<body class="bg-gray-600 bg-gradient-to-br from-gray-400 to-[#20b3b3] flex items-center justify-center h-screen">
    <div class="flex-col items-center w-[600px] h-[auto] bg-gray-100 rounded-xl gap-8 flex">
        <div class=" w-[500px] text-center"><p class="text-6xl text-blue-400 mt-8 font-bold">Crea tu usuario</p></div>
        <div class="flex flex-col">
            <label for=""class="font-semibold mb-1">Nombre:</label>
            <input id="nombre" class="bg-gray-300 transition duration-500 rounded-lg w-[500px] text-xl mb-5 px-3 py-2 outline-none " type="text" placeholder="Escriba su nombre, ejemplo: Juan">
            <label for="" class="font-semibold mb-1">Apellido:</label>
            <input id="apellido" class="bg-gray-300 transition duration-500 rounded-lg w-[500px] text-xl mb-5 px-3 py-2 outline-none " type="text" placeholder="Escriba su apellido, ejemplo: Garcia">
            <label for="" class="font-semibold mb-1">Edad:</label>
            <input id="edad" class="bg-gray-300  transition duration-500 rounded-lg w-[500px] text-xl mb-5 px-3 py-2 outline-none " type="number" max="99" min="1" placeholder="Escriba su edad (1-99)">
            <label for="email" class="font-semibold mb-1">Email:</label>
            <input id="email" class="bg-gray-300 transition duration-500 rounded-lg w-[500px] text-xl mb-5 px-3 py-2 outline-none" type="email" placeholder="ejemplo@correo.com">
            <label for="" class="font-semibold mb-1">Contraseña:</label>
            <input id="password" type="password" placeholder="Crea una contraseña con 7-8 caracteres" class="bg-gray-300 transition duration-500 rounded-lg w-[500px] mb-5 text-xl px-3 py-2 outline-none">
            <div id="resultPasswordInvalid">
            </div>
            <label for="" class="font-semibold mb-1">Confirmar Contraseña:</label>
            <input id="confirmPassword" type="password" placeholder="Crea una contraseña con 7-8 caracteres" class="bg-gray-300 transition duration-500 rounded-lg w-[500px] text-xl mb-5 px-3 py-2 outline-none">
            <div id="passwordMatch">
            </div>        
        </div>
        <div class="flex justify-center">
            <button id="button" class="hover:bg-blue-400 hover:scale-110 transition duration-500 cursor-pointer justify-center bg-[#00c9c9] w-[200px] h-[50px] rounded-xl text-xl ">Crear cuenta</button>
        </div>
        <div class="mb-10">
            <p>Ya tienes una cuenta? <a href="login.html" class="text-blue-600 underline">Log In</a></p>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://zvjxpexicorduvlsitfx.supabase.co'
        // Guarda la URL del proyecto del supabase
        const SUPABASE_KEY = 'sb_publishable_1D-7xOkRDEmIER0b7CadvA_aOe9sbei'
        // Guarda la clave pública (anon key) para acceder a Supabase
        const { createClient } = supabase;
        // Toma la función createClient que está dentro del objeto "supabase"
        // y la guarda en una variable llamada createClient
        // (esto se llama desestructuración en JavaScript)
        // Así luego podremos usar createClient() directamente sin escribir supabase.createClient()
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        // Crea el cliente de conexión a Supabase usando la URL y la clave, y lo guarda en la variable _supabase

        let password = document.querySelector('#password');
        let confirmPassword = document.querySelector('#confirmPassword');
        let button = document.querySelector("#button")
        let invalidPass = document.querySelector("#resultPasswordInvalid")
        let passwordMatch = document.querySelector("#passwordMatch")

        function passwordValidation(){
            if (password.value.length < 7){
                invalidPass.innerHTML = `<p class="mb-4 text-red-500 bg-red-200 w-[200px] flex justify-center rounded-xl px-1 py-2">La contraseña no es valida</p>`
            } else {
                invalidPass.innerHTML = `<p class="mb-4 text-green-500 bg-green-200 w-[200px] flex justify-center rounded-xl px-1 py-2">La contraseña es valida</p>`
            }
            
            if(confirmPassword.value.length > 0 && confirmPassword.value !== password.value){
                passwordMatch.innerHTML = `<p class="mb-4 text-red-500 bg-red-200 w-[200px] flex justify-center rounded-xl px-1 py-2">La contraseña no coincide</p>`
            } else {
                passwordMatch.innerHTML = ""
            }
        }

        password.addEventListener("input", passwordValidation)
        confirmPassword.addEventListener("input", passwordValidation)
        
        button.addEventListener('click', async () => {
            // Evento cuando haces click en el botón (función asíncrona)
            // "asíncrona" significa que puede esperar a que algo termine (por ejemplo una base de datos o una API)
            // sin bloquear el resto del programa mientras espera
            const nombre = document.querySelector('#nombre').value.trim();
            // Obtiene nombre sin espacios
            const apellido = document.querySelector('#apellido').value.trim();
            // Obtiene apellido sin espacios
            const email = document.querySelector('#email').value.trim();
            // Obtiene email sin espacios
            const edad = parseInt(document.querySelector('#edad').value);
            // Convierte edad a número entero
            const pass = password.value;
            // Guarda contraseña en variable para usarla después

            // --- VALIDACIONES ESTRICTAS ---
            
            // 1. Edad
            if (edad > 99 || edad < 1) {
                // Comprueba que la edad esté entre 1 y 99
                alert("Edad no permitida. Debe ser entre 1 y 99 años.");
                // Muestra alerta
                return;
                // Detiene el proceso
            }

            // 2. Formato de correo y dominios oficiales
            const dominiosProhibidos = ['gsdfa.com', 'test.com', 'inventado.com']; 
            // Lista de dominios bloqueados
            const dominioArr = email.split('@');
            // Divide email en usuario y dominio
            
            if (dominioArr.length < 2 || dominiosProhibidos.includes(dominioArr[1].toLowerCase())) {
                // Si no hay dominio válido o está prohibido
                alert("Este dominio de correo no está permitido.");
                // Muestra alerta
                return;
                // Detiene ejecución
            }

            // 3. Confirmación de contraseña
            if (pass !== confirmPassword.value) {
                // Si las contraseñas no coinciden
                alert("Las contraseñas no coinciden.");
                // Muestra alerta
                return;
                // Detiene ejecución
            }

            // --- REGISTRO EN SUPABASE ---
            const { data, error: authError } = await _supabase.auth.signUp({
                // Crea usuario en Supabase Auth
                email: email,
                password: pass,
            });

            if (authError) {
                // Si hay error en registro
                alert("Error: " + authError.message);
                // Muestra alerta
                return;
                // Detiene ejecución
            }

            if (data.user) {
                // Insertar en la tabla 'users'
                const { error: dbError } = await _supabase
                    .from('users')
                    .insert([{ 
                        id: data.user.id, 
                        nombre: nombre, 
                        apellido: apellido, 
                        email: email
                    }]);

                if (dbError) {
                    alert("Error al guardar datos en la tabla: " + dbError.message);
                } else {
                    // Mensaje de éxito
                    alert("¡Cuenta creada con éxito!");
                    
                    // Redirección al inicio (index.html o tu página principal)
                    window.location.href = '../index.html'; 
                }
            }
        });
</script>
</body>
</html>
