<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="shortcut icon" href="../imagenes/icono.png" type="image/x-icon">
</head>
<body class="font-['Franklin_Gothic_Medium','Arial_Narrow',Arial,sans-serif]">
    <header class=" flex w-full justify-around items-center border-b-[5px] border-[#20b3b3] bg-white">
        <div class="flex items-center">
            <div class="w-[90px] flex items-center">
                <img src="../imagenes/logo-upstart.png" alt="LOGO UPSTART" class="w-full">
            </div>
            <h1 class="text-[#20b3b3] text-[32px] font-bold pb-[8px]">UPSTART</h1>
        </div>
        <nav class="w-[60%] font-bold">
            <ul class="flex justify-around list-none m-0 p-0">
                <li class="hover:scale-110 transition-all duration-200">
                    <a href="../index.html" class="no-underline text-black px-[7px] py-[7px] rounded-[10px] hover:bg-[#469696] hover:text-white">INICIO</a>
                </li>
                <li class="hover:scale-110 transition-all duration-200">
                    <a href="upstart.html" class="no-underline text-black px-[7px] py-[7px] rounded-[10px] hover:bg-[#469696] hover:text-white">PUBLICA</a>
                </li>
                <li class="hover:scale-110 transition-all duration-200">
                    <a href="donaciones.html" class="no-underline text-black px-[7px] py-[7px] rounded-[10px] hover:bg-[#469696] hover:text-white">DONACIONES</a>
                </li>
                <li class="hover:scale-110 transition-all duration-200">
                    <a href="contacto.html" class="no-underline text-black px-[7px] py-[7px] rounded-[10px] hover:bg-[#469696] hover:text-white">CONTACTO</a>
                </li>
            </ul>
        </nav>
        <div class="lg ml-[10px]">
            <div class="border-2 border-[#20b3b3] rounded-[20px] hover:bg-[#20b3b3] transition-all duration-200">
                <a href="login.html" class="no-underline px-[25px] py-[13px] rounded-[20px] font-bold text-[#20b3b3] block hover:text-white">Log in</a>
            </div>
        </div>
        <div id="user-profile" class="hidden items-center gap-3 ml-[10px]" style="display:none;">
            <img id="user-avatar" src="" alt="Avatar" class="w-[42px] h-[42px] rounded-full border-2 border-[#20b3b3]">
            <button id="logoutButton" class="cursor-pointer border-2 border-[#20b3b3] text-[#20b3b3] font-bold px-[18px] py-[10px] rounded-[20px] hover:bg-[#20b3b3] hover:text-white transition-all duration-200">
                Salir
            </button>
        </div>
    </header>
    <main class="mt-[40px] w-[100%]">
        <section class="w-[90%] m-auto mb-4 flex justify-between items-center">
            <div class="w-[20%] flex justify-around">
                <div class="flex items-center gap-2">
                    <input type="radio" id="opcion1" name="grupo" value="1" class="appearance-none w-4 h-4 rounded-full border-2 border-gray-400 checked:scale-135 checked:border-[#20b3b3] checked:bg-[#20b3b3] transition-all duration-200 ease-in-out">
                    <label for="opcion1">Cronologico</label>
                </div>
                <div class="flex items-center gap-2">
                    <input type="radio" id="opcion2" name="grupo" value="2" class="appearance-none w-4 h-4 rounded-full border-2 border-gray-400 checked:scale-135 checked:border-[#20b3b3] checked:bg-[#20b3b3] transition-all duration-200 ease-in-out">
                    <label for="opcion2" class="">Aleatorio</label>
                </div>
            </div>
            <div class="w-[60%]">
                <input type="text" placeholder="Busca" class="w-[100%] border-2 rounded-2xl border-[#20b3b3] p-4">
            </div>
            <div class="flex w-[20%] justify-around">
                <div>
                    <button class="cursor-pointer bg-[#e3e4e6] py-2 px-3 rounded-xl hover:bg-[#20b3b3] hover:text-white duration-150"> Mis ideas</button>
                </div>
                <div>
                    <button class="cursor-pointer bg-[#e3e4e6] py-2 px-3 rounded-xl hover:bg-[#20b3b3] hover:text-white duration-150"> Publicar idea +</button>
                </div>
            </div>
        </section>
        <section class="w-[90%] m-auto flex flex-wrap gap-[20px]">
            
        </section>
    </main>
    <footer class="w-full flex flex-row justify-around items-center bg-[#20b3b3] mt-[3%] px-8 py-[30px]">
        <div class="text-black">a</div>
        <div class="text-black">a</div>
        <div>
            <h3 class="border-b-[3px] border-[#ffe7e7] pb-[5px] text-white mb-2 font-bold text-[1.17em]">Paginas</h3>
            <p class="text-[14px] my-3"><a href="index.html" class="text-white no-underline font-bold">INICIO</a></p>
            <p class="text-[14px] my-3"><a href="paginas/upstart.html" class="text-white no-underline font-bold">PUBLICA</a></p>
            <p class="text-[14px] my-3"><a href="paginas/donaciones.html" class="text-white no-underline font-bold">DONACIONES</a></p>
            <p class="text-[14px] my-3"><a href="paginas/contacto.html" class="text-white no-underline font-bold">CONTACTO</a></p>
        </div>
    </footer>
    <script>
        const SUPABASE_URL = 'https://zvjxpexicorduvlsitfx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_1D-7xOkRDEmIER0b7CadvA_aOe9sbei';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function gestionarHeader() {
            const { data: { user } } = await _supabase.auth.getUser();

            const loginContainer = document.querySelector('.lg');
            const userProfile = document.getElementById('user-profile');
            const userAvatar = document.getElementById('user-avatar');

            if (user) {
                if (loginContainer) loginContainer.style.display = 'none';
                userProfile.style.display = 'flex';
                userAvatar.src = `https://ui-avatars.com/api/?name=${user.email}&background=00c9c9&color=fff`;
            } else {
                if (loginContainer) loginContainer.style.display = 'block';
                userProfile.style.display = 'none';
            }
        }

        document.getElementById('logoutButton').addEventListener('click', async () => {
            const { error } = await _supabase.auth.signOut();
            if (error) console.log("Error al salir:", error.message);
            window.location.reload();
        });

        gestionarHeader();
    </script>
</body>
</html>
