<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-User</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="shortcut icon" href="../imagenes/icono.png" type="image/x-icon">
</head>
<body class="bg-gray-500 bg-gradient-to-br from-gray-400 to-[#20b3b3] flex items-center justify-center h-screen">
    <div class="flex-col items-center w-[600px] h-[540px] bg-gray-100 rounded-xl gap-8 flex">
        <div class=" w-[300px] text-center"><p class="text-6xl text-blue-400 mt-8 font-bold">Log in</p></div>
        <div class="mt-0 mb-2">
            <input id="email" class="bg-gray-300 hover:scale-105 transition duration-500 rounded-lg w-[500px] text-xl mt-10 mb-10 px-3 py-2 outline-none " type="text" placeholder="Escriba su correo...">
            <div class="flex">
                <input type="password" id="password" placeholder="Contraseña" class="bg-gray-300 hover:scale-105 transition duration-500 rounded-lg w-[500px] text-xl px-3 py-2 outline-none">
            </div>
            <div class="text-end mt-1">
                <p class="inline-block"><a href="#">¿Olvidaste tu contraseña?</a></p>
            </div>            
        </div>
        <div class="flex justify-center">
            <button id="loginButton" class="hover:bg-blue-400 hover:scale-110 transition duration-500 cursor-pointer justify-center bg-[#00c9c9] w-[200px] h-[50px] rounded-xl text-xl mt-5">Iniciar sesión</button>
        </div>
        <div class="mt-1">
            <p>No tienes una cuenta? <a href="login2.html" class="text-blue-500 underline">Registrarse</a></p>
        </div>
    </div>
    <script>
        // 1. CONEXIÓN (Igual que en la otra página)
        const SUPABASE_URL = 'https://zvjxpexicorduvlsitfx.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_1D-7xOkRDEmIER0b7CadvA_aOe9sbei'
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. FUNCIÓN DE LOGIN
        const loginButton = document.querySelector("#loginButton");

        loginButton.addEventListener('click', async () => {
            const email = document.querySelector('#email').value;
            const pass = document.querySelector('#password').value;

            // Intentar iniciar sesión
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: pass,
            });

            if (error) {
                alert("Error al entrar: " + error.message);
            } else {
                alert("¡Bienvenido de nuevo!");
                // Redirigir a la página principal de tu app
                window.location.href = "../index.html"; 
            }
        });
    </script>
</body>
</html>
