<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-User</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
</head>
<body class="bg-gray-300 flex items-center justify-center h-screen">
    <div class="flex-col items-center w-[600px] h-[600px] bg-gray-100 rounded-xl gap-12 flex">
        <div class="flex w-[300px] justify-center"><p class="text-6xl text-blue-400 mt-5 bg-">Login</p></div>
        <input class="bg-blue-200 hover:scale-105 transition duration-500 rounded-lg w-[500px] text-xl mt-10 px-3 py-2 outline-none " type="text" placeholder="Escriba su usuario o correo...">
        <div class="flex">
            <input type="password" placeholder="Contraseña" class="bg-blue-200 hover:scale-105 transition duration-500 rounded-lg w-[500px] text-xl px-3 py-2 outline-none">
        </div>
        <div class="flex justify-center">
            <button class="hover:bg-blue-400 hover:scale-110 transition duration-500 cursor-pointer justify-center bg-[#00c9c9] w-[200px] h-[50px] rounded-xl text-xl">Iniciar sesión</button>
        </div>
        <div class="mt-10 text-xl flex justify-center gap-4">
            <a href="#">Registrarse</a>
            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
    </div>
</body>
</html>
